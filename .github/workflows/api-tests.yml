name: API Automation Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      MONGO_URI: mongodb://localhost:27017/testdb
      BASE_URL: http://127.0.0.1:8001
      JWT_SECRET: dev-secret-for-local-testing
      ADMIN_EMAIL: john@example.com
      ADMIN_PASSWORD: Admin@123

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # -----------------------------
      # INSTALL DEPENDENCIES (FIXED)
      # -----------------------------
      - name: Install dependencies
        run: npm ci || npm install

      # -----------------------------
      # START BACKEND
      # -----------------------------
      - name: Start backend server
        run: |
          nohup npm start > server.log 2>&1 &
          
      # -----------------------------
      # WAIT FOR BACKEND (NO SLEEP MAGIC)
      # -----------------------------
      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8001/health || curl -s http://127.0.0.1:8001; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting... attempt $i"
            sleep 2
          done
          echo "Backend failed to start"
          cat server.log
          exit 1

      # -----------------------------
      # BOOTSTRAP STEPS
      # -----------------------------
      - name: Ensure Admin Exists
        run: node scripts/ensureAdmin.js

      - name: Login Admin + Update Env
        run: node scripts/loginAdmin.js

      - name: Register Worker User
        run: node scripts/registerWorker.js

      # -----------------------------
      # RUN TESTS
      # -----------------------------
      - name: Run API Tests
        run: npm run test:postman