name: API Automation Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      MONGO_URI: mongodb://localhost:27017/testdb
      BASE_URL: http://localhost:8001
      ADMIN_EMAIL: john@example.com
      ADMIN_PASSWORD: Admin@123

    steps:
      # -----------------------------
      # Checkout code
      # -----------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------
      # Setup Node
      # -----------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # -----------------------------
      # CLEAN INSTALL (FIX FOR AXIOS ERROR)
      # -----------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------
      # Start backend
      # -----------------------------
      - name: Start backend server
        run: |
          nohup npm run dev > server.log 2>&1 &

      # -----------------------------
      # Wait for backend readiness
      # -----------------------------
      - name: Wait for backend
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -s http://localhost:8001 || curl -s http://localhost:8001/health; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Attempt $i - waiting..."
            sleep 2
          done

          echo "Backend failed to start"
          cat server.log
          exit 1

      # -----------------------------
      # Bootstrap Admin
      # -----------------------------
      - name: Ensure Admin Exists
        run: node scripts/ensureAdmin.js

      # -----------------------------
      # Login Admin + Update Env
      # -----------------------------
      - name: Login Admin + Update Env
        run: node scripts/loginAdmin.js

      # -----------------------------
      # Create Worker User
      # -----------------------------
      - name: Register Worker User
        run: node scripts/registerWorker.js

      # -----------------------------
      # Run Postman Tests
      # -----------------------------
      - name: Run API Tests
        run: npm run test:postman